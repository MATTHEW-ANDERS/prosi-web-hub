<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kitteens Hub - Masuk</title>
    <!-- Google Fonts: Figtree -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/login.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <header class="brand-header">
                <h1 class="brand-title">KITTEENS <span class="brand-highlight">HUB</span></h1>
                <p class="brand-subtitle">Jadwal Pelayanan & Bank Lagu Remaja</p>
            </header>

            <div class="badge-container">
                <span class="access-badge">AKSES KHUSUS ANGGOTA</span>
            </div>

            <button class="google-login-btn" id="googleLoginBtn">
                <svg class="google-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
                    <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
                    <path fill="#4285F4" d="M46.5 24c0-1.61-.15-3.16-.42-4.69H24v8.89h12.66c-.55 2.92-2.2 5.39-4.68 7.06l7.27 5.63C43.5 36.21 46.5 30.73 46.5 24z"/>
                    <path fill="#FBBC05" d="M10.54 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.98-6.19z"/>
                    <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.27-5.63c-2.03 1.36-4.63 2.19-8.62 2.19-6.26 0-11.57-4.22-13.46-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
                </svg>
                <span class="btn-text">Masuk dengan Akun Gmail</span>
            </button>

            <div class="divider"></div>

            <footer class="login-footer">
                <p class="footer-note">Hanya akun Gmail terdaftar yang dapat masuk ke sistem.</p>
            </footer>
        </div>
    </div>

    <!-- Custom JS -->
    <script src="js/login.js"></script>
</body>
</html>
